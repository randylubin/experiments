<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Quest: Bridge of Khazad-dûm</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --gold:   #FFD700;
  --fire:   #FF6600;
  --glow:   #FF4400;
  --dim:    #08040a;
}

body {
  width:100vw; height:100vh;
  overflow:hidden;
  background:var(--dim);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Nunito',sans-serif;
}

/* ═══════════════════════════════════════
   KHAZAD-DÛM BACKGROUND SCENE
═══════════════════════════════════════ */
.scene {
  position:fixed; inset:0; z-index:0; pointer-events:none;
}

/* Cavern stone texture */
.cavern {
  position:absolute; inset:0;
  background:
    repeating-linear-gradient(90deg,  rgba(30,18,8,.22) 0,rgba(30,18,8,.22) 1px,transparent 1px,transparent 55px),
    repeating-linear-gradient(0deg,   rgba(30,18,8,.22) 0,rgba(30,18,8,.22) 1px,transparent 1px,transparent 55px),
    linear-gradient(to bottom, #06030d 0%, #0e0606 55%, #160b03 100%);
}

/* Fire abyss */
.abyss {
  position:absolute; bottom:0; left:0; right:0; height:52%;
  background:
    radial-gradient(ellipse 90% 65% at 50% 105%,
      rgba(255,130,0,.85)  0%,
      rgba(210,55,0,.65)  22%,
      rgba(110,20,0,.45)  44%,
      transparent         70%);
  animation:flicker 3.5s ease-in-out infinite;
}
@keyframes flicker {
  0%,100% { opacity:1;   transform:scaleX(1);    }
  28%     { opacity:.78; transform:scaleX(1.015); }
  55%     { opacity:.92; transform:scaleX(.985);  }
  78%     { opacity:.82; transform:scaleX(1.01);  }
}

/* Side walls / pillars */
.wall {
  position:absolute; top:0; bottom:0; width:13%;
  background:
    repeating-linear-gradient(90deg, rgba(50,32,12,.3) 0,rgba(50,32,12,.3) 2px,transparent 2px,transparent 18px),
    repeating-linear-gradient(0deg,  rgba(50,32,12,.2) 0,rgba(50,32,12,.2) 2px,transparent 2px,transparent 45px),
    linear-gradient(to right,#0c0705,#181008,#0c0705);
}
.wall.left  { left:0;  box-shadow:inset -8px 0 30px rgba(255,90,0,.08); }
.wall.right { right:0; box-shadow:inset  8px 0 30px rgba(255,90,0,.08); }

/* The Bridge */
.bridge {
  position:absolute; bottom:24%; left:50%;
  transform:translateX(-50%);
  width:290px; height:13px;
  background:linear-gradient(to bottom,#6e4c28,#3c1e0a);
  border-radius:2px;
  box-shadow:0 5px 0 #21100200, 0 7px 40px rgba(255,90,0,.55), 0 0 90px rgba(255,60,0,.25);
}
.bridge::before,.bridge::after {
  content:'';
  position:absolute; top:0; height:100%; width:120px;
  background:linear-gradient(to bottom,#5a3c1a,#2a1208);
}
.bridge::before { right:100%; }
.bridge::after  { left:100%;  }

/* Arch suggestion at top */
.arch {
  position:absolute; top:0; left:50%;
  transform:translateX(-50%);
  width:420px; height:200px;
  border-radius:50% 50% 0 0 / 100% 100% 0 0;
  border:3px solid rgba(60,35,12,.5);
  border-bottom:none;
  box-shadow:inset 0 0 40px rgba(0,0,0,.7);
}

/* Ember particle animation */
@keyframes riseEmber {
  0%   { transform:translateY(0)     translateX(0)            scale(1);   opacity:.95; }
  50%  { transform:translateY(-45vh) translateX(var(--drift))  scale(.6);  opacity:.6;  }
  100% { transform:translateY(-92vh) translateX(var(--drift2)) scale(.05); opacity:0;   }
}

/* ═══════════════════════════════════════
   GAME UI
═══════════════════════════════════════ */
.game-wrap {
  position:relative; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; gap:14px;
  width:100%; max-width:660px;
  padding:16px;
}

/* Header */
.title {
  font-family:'Cinzel',serif;
  font-size:clamp(.8rem,2.2vw,1.1rem);
  color:#bb5500;
  text-shadow:0 0 22px #ff4400,0 2px 4px #000;
  letter-spacing:.18em; text-transform:uppercase;
  margin-bottom:4px; text-align:center;
}
.score-bar {
  font-family:'Cinzel',serif;
  font-size:clamp(1rem,3vw,1.5rem);
  color:var(--gold);
  text-shadow:0 0 14px #ff9900,0 0 30px rgba(255,150,0,.5);
  text-align:center;
}

/* Problem panel */
.problem-panel {
  background:rgba(0,0,0,.68);
  border:2px solid rgba(200,120,0,.3);
  border-radius:22px;
  padding:22px 28px 22px;
  display:flex; align-items:flex-end;
  justify-content:center; gap:14px;
  width:100%;
  backdrop-filter:blur(7px);
  box-shadow:
    0 0 50px rgba(255,100,0,.1),
    0 0 0 1px rgba(255,160,0,.08),
    inset 0 1px 0 rgba(255,160,0,.1);
  min-height:268px;
}

/* Individual number block column */
.block-wrap {
  display:flex; flex-direction:column;
  align-items:center;
}

.block-grid {
  display:grid;
  gap:4px;
}

.cell {
  width:42px; height:42px;
  border-radius:10px;
  position:relative;
  border:3px solid rgba(255,255,255,.22);
  box-shadow:
    inset 0 3px 0 rgba(255,255,255,.45),
    inset 0 -4px 0 rgba(0,0,0,.4),
    0 5px 10px rgba(0,0,0,.55);
}

/* Eyes */
.eye {
  position:absolute;
  width:11px; height:11px;
  background:#fff;
  border-radius:50%;
  top:7px;
}
.eye.L { left:4px;  }
.eye.R { right:4px; }
.pupil {
  width:5px; height:5px;
  background:#111;
  border-radius:50%;
  position:absolute;
  top:3px; left:3px;
}

.blabel {
  margin-top:7px;
  font-size:1.35rem;
  font-weight:900;
  text-shadow:0 2px 5px #000;
}

/* + = ? */
.op {
  font-size:2.3rem;
  font-weight:900;
  color:var(--gold);
  text-shadow:0 0 16px #ff9900,0 2px 4px #000;
  padding-bottom:14px;
  flex-shrink:0;
  user-select:none;
}

/* Answer buttons */
.answers { display:flex; gap:14px; }

.abtn {
  width:90px; height:90px;
  border-radius:18px;
  border:2px solid rgba(210,150,10,.35);
  background:rgba(12,6,2,.88);
  color:var(--gold);
  font-family:'Nunito',sans-serif;
  font-size:2.3rem; font-weight:900;
  cursor:pointer;
  transition:transform .14s, background .14s, border-color .14s, box-shadow .14s;
  text-shadow:0 0 12px rgba(255,180,0,.55);
  box-shadow:0 0 22px rgba(255,100,0,.12), inset 0 1px 0 rgba(255,180,0,.08);
  backdrop-filter:blur(4px);
}
.abtn:hover:not(:disabled) {
  background:rgba(60,28,4,.92);
  border-color:var(--gold);
  box-shadow:0 0 32px rgba(255,200,0,.35);
  transform:translateY(-4px) scale(1.06);
}
.abtn:active:not(:disabled) { transform:scale(.96); }
.abtn:disabled { cursor:not-allowed; }

@keyframes shake {
  0%,100% { transform:translateX(0); }
  18% { transform:translateX(-10px); }
  36% { transform:translateX(10px);  }
  54% { transform:translateX(-7px);  }
  72% { transform:translateX(7px);   }
  90% { transform:translateX(-3px);  }
}
.abtn.wrong   {
  animation:shake .45s ease;
  background:rgba(130,0,0,.88) !important;
  border-color:#ff3333 !important;
  color:#ffaaaa !important;
}
.abtn.correct {
  background:rgba(0,120,0,.88) !important;
  border-color:#00ff77 !important;
  color:#aaffcc !important;
  box-shadow:0 0 45px rgba(0,255,100,.4) !important;
}

/* Message */
.msg {
  font-family:'Cinzel',serif;
  font-size:clamp(.95rem,2.8vw,1.35rem);
  min-height:2rem; text-align:center;
  letter-spacing:.06em;
}
.msg.ok   { color:var(--gold);  text-shadow:0 0 22px #ff9900,0 0 40px rgba(255,150,0,.5); }
.msg.fail { color:#ff4444; text-shadow:0 0 16px #aa0000; }

/* Result block pop-in */
@keyframes popIn {
  0%   { transform:scale(0) rotate(-12deg); opacity:0; }
  55%  { transform:scale(1.18) rotate(4deg);  opacity:1; }
  75%  { transform:scale(.93) rotate(-1.5deg); }
  100% { transform:scale(1) rotate(0deg);    opacity:1; }
}
@keyframes bounceIn {
  0%   { transform:scale(0) translateY(20px); opacity:0; }
  60%  { transform:scale(1.1) translateY(-4px); opacity:1; }
  100% { transform:scale(1) translateY(0);    opacity:1; }
}

/* Screen flash */
.flash {
  position:fixed; inset:0;
  background:#fff;
  z-index:200; pointer-events:none;
  animation:flashFade .55s ease forwards;
}
@keyframes flashFade {
  0%   { opacity:.65; }
  100% { opacity:0;   }
}

/* Celebration particles */
@keyframes burst {
  0%   { transform:translate(-50%,-50%) scale(1);   opacity:1; }
  100% { transform:translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(.15); opacity:0; }
}
.spark {
  position:fixed;
  border-radius:50%;
  pointer-events:none;
  z-index:150;
  animation:burst .95s ease-out forwards;
}

/* Star trail for celebration */
@keyframes starFloat {
  0%   { transform:translate(-50%,-50%) scale(1) rotate(0deg);   opacity:1; }
  100% { transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) scale(0) rotate(360deg); opacity:0; }
}
.star {
  position:fixed;
  pointer-events:none;
  z-index:151;
  font-size:1.4rem;
  animation:starFloat 1.1s ease-out forwards;
}

/* ═══════════════════════════════════════
   CHASE TRACK
═══════════════════════════════════════ */
.chase-track {
  position:relative;
  width:100%;
  height:66px;
  background:
    repeating-linear-gradient(90deg,rgba(40,22,8,.28) 0,rgba(40,22,8,.28) 1px,transparent 1px,transparent 26px),
    linear-gradient(to bottom,#0c0704,#1c0c03,#0c0704);
  border:1px solid rgba(180,100,0,.22);
  border-radius:14px;
  overflow:hidden;
  flex-shrink:0;
  box-shadow:
    inset 0 0 35px rgba(255,80,0,.06),
    0 0 18px rgba(255,80,0,.05);
}
.chase-track::before {
  content:''; position:absolute;
  inset:0;
  background:radial-gradient(ellipse 70% 80% at 50% 120%,rgba(255,90,0,.13),transparent);
  pointer-events:none;
}
.chase-track::after {
  content:''; position:absolute;
  bottom:0; left:0; right:0; height:38%;
  background:linear-gradient(to top,rgba(255,80,0,.17),transparent);
  pointer-events:none;
}

.chase-char {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:1.55rem;
  line-height:1;
  white-space:nowrap;
  transition:left .7s cubic-bezier(.34,1.45,.64,1);
  user-select:none;
  pointer-events:none;
}

.chase-balrog {
  filter:drop-shadow(0 0 7px rgba(255,100,0,.7));
  animation:balrogBob 1.2s ease-in-out infinite;
  z-index:2;
}
.chase-balrog.near {
  filter:drop-shadow(0 0 18px rgba(255,40,0,1)) drop-shadow(0 0 36px rgba(255,0,0,.6));
  animation:balrogBobFast .45s ease-in-out infinite;
}
.chase-fellowship {
  filter:drop-shadow(0 0 5px rgba(120,200,255,.4));
  animation:fellowRun .55s ease-in-out infinite;
  z-index:2;
}
.chase-fellowship.panic-run {
  animation:fellowPanic .18s linear infinite;
}

@keyframes balrogBob {
  0%,100% { transform:translateY(-50%); }
  50%     { transform:translateY(calc(-50% - 4px)); }
}
@keyframes balrogBobFast {
  0%,100% { transform:translateY(-50%) scale(1.06); }
  50%     { transform:translateY(calc(-50% - 6px)) scale(1.12); }
}
@keyframes fellowRun {
  0%,100% { transform:translateY(-50%); }
  25%     { transform:translateY(calc(-50% - 5px)); }
  75%     { transform:translateY(calc(-50% + 2px)); }
}
@keyframes fellowPanic {
  0%,100% { transform:translateY(-50%) rotate(-3deg); }
  50%     { transform:translateY(calc(-50% - 7px)) rotate(3deg); }
}

/* Track flash states */
@keyframes trackPanic {
  0%,100% { box-shadow:inset 0 0 35px rgba(255,80,0,.06),0 0 18px rgba(255,80,0,.05); }
  50%     { box-shadow:inset 0 0 60px rgba(255,0,0,.35), 0 0 35px rgba(255,0,0,.25), 0 0 0 2px rgba(255,60,0,.6); }
}
@keyframes trackEscape {
  0%,100% { box-shadow:inset 0 0 35px rgba(255,80,0,.06),0 0 18px rgba(255,80,0,.05); }
  50%     { box-shadow:inset 0 0 50px rgba(0,255,100,.18),0 0 30px rgba(0,200,80,.15), 0 0 0 2px rgba(50,255,120,.4); }
}
.chase-track.panic { animation:trackPanic .32s ease 4; }
.chase-track.escape { animation:trackEscape .42s ease 3; }

/* Danger label */
.chase-label {
  position:absolute;
  right:10px; top:50%;
  transform:translateY(-50%);
  font-family:'Cinzel',serif;
  font-size:.62rem;
  letter-spacing:.12em;
  color:rgba(200,120,30,.5);
  pointer-events:none;
  z-index:3;
}
</style>
</head>
<body>

<!-- ═══ SCENE ═══ -->
<div class="scene">
  <div class="cavern"></div>
  <div class="abyss"></div>
  <div class="wall left"></div>
  <div class="wall right"></div>
  <div class="arch"></div>
  <div class="bridge"></div>
</div>

<!-- ═══ GAME ═══ -->
<div class="game-wrap">
  <div>
    <div class="title">⚔ &nbsp;The Bridge of Khazad-dûm&nbsp; ⚔</div>
    <div class="score-bar">⭐ &nbsp;<span id="score">0</span> &nbsp;correct</div>
  </div>

  <!-- CHASE TRACK -->
  <div class="chase-track" id="chaseTrack">
    <div class="chase-char chase-balrog" id="chaseBalrog">🔥👹🔥</div>
    <div class="chase-char chase-fellowship" id="chaseFellowship">🏹🧝‍♂️🛡️🧙🧝‍♀️🧙‍♂️</div>
    <div class="chase-label" id="chaseLabel">THE BRIDGE</div>
  </div>

  <div class="problem-panel" id="panel">
    <div class="block-wrap" id="blockA"></div>
    <div class="op">+</div>
    <div class="block-wrap" id="blockB"></div>
    <div class="op">=</div>
    <div class="op" id="qmark">?</div>
    <div class="block-wrap" id="blockR" style="display:none;"></div>
  </div>

  <div class="answers" id="answers"></div>
  <div class="msg" id="msg"></div>
</div>

<script>
/* ─── COLORS per digit ─── */
const PAL = {
  1:  ['#FF3B3B','#B81010'],
  2:  ['#FF8C00','#BB5500'],
  3:  ['#FFD600','#AA8800'],
  4:  ['#44BB44','#227722'],
  5:  ['#3399FF','#1155CC'],
  6:  ['#A040D0','#6A1090'],
  7:  ['#EE2277','#99114A'],
  8:  ['#CC7722','#884400'],
  9:  ['#00BBCC','#006677'],
  10: ['#FFD700','#AA8800'],
};

/* Columns per number (grid layout) */
const COLS = { 1:1,2:1,3:1,4:2,5:1,6:2,7:2,8:2,9:3,10:2 };

let score=0, numA, numB, answerable=true;

/* ─── CHASE STATE ─── */
// 0 = escaped, 10 = caught. Start at 4.
let chase = 4;
const CHASE_MAX = 10;

function updateChase() {
  const track   = document.getElementById('chaseTrack');
  const balrog  = document.getElementById('chaseBalrog');
  const fellows = document.getElementById('chaseFellowship');
  const label   = document.getElementById('chaseLabel');

  // balrog: left 2% (safe) -> 54% (caught)
  const balrogPct = 2  + chase * 5.2;
  // fellowship: left 72% (safe) -> 46% (caught)
  const fellowPct = 72 - chase * 2.6;

  balrog.style.left  = balrogPct + '%';
  fellows.style.left = fellowPct + '%';

  if (chase >= 7) {
    balrog.classList.add('near');
    fellows.classList.add('panic-run');
    label.textContent = chase >= 9 ? '\u26a0 FLEE! \u26a0' : '\u26a0 DANGER \u26a0';
    label.style.color = 'rgba(255,80,0,.85)';
  } else {
    balrog.classList.remove('near');
    fellows.classList.remove('panic-run');
    label.textContent = 'THE BRIDGE';
    label.style.color = 'rgba(200,120,30,.5)';
  }
}

function chaseCorrect() {
  chase = Math.max(0, chase - 1);
  updateChase();
  if (chase === 0) {
    // briefly celebrate escape then reset to comfortable distance
    const track = document.getElementById('chaseTrack');
    track.classList.add('escape');
    setTimeout(() => { track.classList.remove('escape'); chase = 2; updateChase(); }, 1500);
  }
}

function chaseWrong() {
  chase = Math.min(CHASE_MAX, chase + 1);
  updateChase();
  if (chase === CHASE_MAX) {
    // Balrog catches up - panic then reset to dangerous-but-survivable distance
    const track = document.getElementById('chaseTrack');
    track.classList.add('panic');
    setTimeout(() => { track.classList.remove('panic'); chase = 7; updateChase(); }, 1500);
  }
}

/* ─── BUILD a number block ─── */
function buildBlock(n) {
  const [hi,lo] = PAL[n]||['#888','#444'];
  const cols = COLS[n]||1;
  let html = `<div class="block-grid" style="grid-template-columns:repeat(${cols},42px);">`;
  for (let i=0;i<n;i++) {
    const topRow = i < cols;
    html += `<div class="cell" style="background:linear-gradient(145deg,${hi},${lo});">`;
    if (topRow) {
      html += `<div class="eye L"><div class="pupil"></div></div>
               <div class="eye R"><div class="pupil"></div></div>`;
    }
    html += `</div>`;
  }
  html += `</div><div class="blabel" style="color:${hi};text-shadow:0 0 12px ${hi},0 2px 5px #000;">${n}</div>`;
  return html;
}

/* ─── EMBER BACKGROUND PARTICLES ─── */
function spawnEmber() {
  const el = document.createElement('div');
  const sz  = 2 + Math.random()*5;
  const hue = 10 + Math.random()*30;
  const dur = 3.5 + Math.random()*4;
  el.style.cssText = `
    position:absolute;
    width:${sz}px; height:${sz}px;
    border-radius:50%;
    left:${10+Math.random()*80}%;
    bottom:${14+Math.random()*22}%;
    background:hsl(${hue},100%,62%);
    box-shadow:0 0 ${sz*2}px hsl(${hue},100%,55%);
    --drift:${(Math.random()-.5)*130}px;
    --drift2:${(Math.random()-.5)*180}px;
    animation:riseEmber ${dur}s ease-out forwards;
    pointer-events:none;
  `;
  document.querySelector('.scene').appendChild(el);
  setTimeout(()=>el.remove(), dur*1000+100);
}
for (let i=0;i<20;i++) setTimeout(spawnEmber, i*250);
setInterval(spawnEmber, 650);

/* ─── NEW PROBLEM ─── */
function newProblem() {
  answerable = true;
  if (document.activeElement) document.activeElement.blur();
  document.getElementById('msg').textContent='';
  document.getElementById('msg').className='msg';
  document.getElementById('qmark').style.display='';
  const rEl = document.getElementById('blockR');
  rEl.style.display='none';
  rEl.style.animation='';

  do {
    numA = 1 + Math.floor(Math.random()*5);
    numB = 1 + Math.floor(Math.random()*5);
  } while (numA+numB > 10);

  const correct = numA+numB;

  /* Render addend blocks with a bounce-in */
  const elA = document.getElementById('blockA');
  const elB = document.getElementById('blockB');
  elA.innerHTML = buildBlock(numA);
  elB.innerHTML = buildBlock(numB);
  elA.style.cssText = 'animation:bounceIn .45s cubic-bezier(.175,.885,.32,1.275) both;';
  elB.style.cssText = 'animation:bounceIn .5s .06s cubic-bezier(.175,.885,.32,1.275) both;';

  /* Build choices */
  const pool = new Set([correct]);
  let attempts = 0;
  while (pool.size < 3 && attempts++ < 400) {
    const off  = 1 + Math.floor(Math.random()*4);
    const sign = Math.random() < .5 ? 1 : -1;
    const c    = correct + off*sign;
    if (c >= 1 && c <= 15) pool.add(c);
  }
  const choices = [...pool].sort(()=>Math.random()-.5);

  /* Render buttons */
  const answDiv = document.getElementById('answers');
  answDiv.innerHTML='';
  choices.forEach(val => {
    const btn = document.createElement('button');
    btn.className='abtn';
    btn.textContent=val;
    btn.addEventListener('click',()=>onAnswer(val,correct,btn));
    answDiv.appendChild(btn);
  });
}

/* ─── HANDLE ANSWER ─── */
function onAnswer(val, correct, btn) {
  if (!answerable) return;
  answerable = false;
  const allBtns = document.querySelectorAll('.abtn');
  allBtns.forEach(b=>b.disabled=true);

  if (val === correct) {
    btn.classList.add('correct');
    score++;
    document.getElementById('score').textContent=score;
    chaseCorrect();
    setMsg('YOU SHALL PASS! ⚔','ok');
    setTimeout(()=>combineBlocks(correct), 360);
  } else {
    btn.classList.add('wrong');
    chaseWrong();
    setMsg('YOU SHALL NOT PASS! 🔥','fail');
    setTimeout(()=>{
      btn.classList.remove('wrong');
      allBtns.forEach(b=>b.disabled=false);
      answerable=true;
      setMsg('','');
    }, 750);
  }
}

/* ─── COMBINE ANIMATION ─── */
function combineBlocks(result) {
  const elA = document.getElementById('blockA');
  const elB = document.getElementById('blockB');

  /* Clear any bounce-in, then slide out */
  elA.style.animation='none';
  elB.style.animation='none';
  elA.offsetHeight; // force reflow

  elA.style.transition='transform .38s ease,opacity .38s ease';
  elB.style.transition='transform .38s ease,opacity .38s ease';
  elA.style.transform='translateX(55px) scale(.45)';
  elA.style.opacity='0';
  elB.style.transform='translateX(-55px) scale(.45)';
  elB.style.opacity='0';

  setTimeout(()=>{
    /* Flash */
    const fl=document.createElement('div');
    fl.className='flash';
    document.body.appendChild(fl);
    setTimeout(()=>fl.remove(),650);

    /* Show result */
    document.getElementById('qmark').style.display='none';
    const rEl=document.getElementById('blockR');
    rEl.innerHTML=buildBlock(result);
    rEl.style.display='flex';
    rEl.style.flexDirection='column';
    rEl.style.alignItems='center';
    rEl.style.animation='popIn .62s cubic-bezier(.175,.885,.32,1.275) forwards';

    celebrate();

    setTimeout(newProblem, 1900);
  }, 420);
}

/* ─── CELEBRATION ─── */
function celebrate() {
  const cx = window.innerWidth/2;
  const cy = window.innerHeight/2;
  const colors = Object.values(PAL).map(([c])=>c);
  const emojis = ['⭐','✨','🌟','💫','🎉','🔥'];

  /* Sparks */
  for (let i=0;i<30;i++) {
    const sp=document.createElement('div');
    sp.className='spark';
    const angle=(i/30)*Math.PI*2 + Math.random()*.4;
    const dist=90+Math.random()*130;
    const tx=Math.cos(angle)*dist;
    const ty=Math.sin(angle)*dist;
    const c=colors[Math.floor(Math.random()*colors.length)];
    const sz=6+Math.random()*12;
    sp.style.cssText=`
      left:${cx}px;top:${cy}px;
      width:${sz}px;height:${sz}px;
      background:${c};
      box-shadow:0 0 ${sz}px ${c};
      --tx:${tx}px;--ty:${ty}px;
      animation-delay:${Math.random()*.18}s;
    `;
    document.body.appendChild(sp);
    setTimeout(()=>sp.remove(),1200);
  }

  /* Star emojis */
  for (let i=0;i<8;i++) {
    const st=document.createElement('div');
    st.className='star';
    const angle=Math.random()*Math.PI*2;
    const dist=60+Math.random()*90;
    st.style.cssText=`
      left:${cx}px;top:${cy}px;
      --tx:${Math.cos(angle)*dist}px;
      --ty:${Math.sin(angle)*dist}px;
      animation-delay:${Math.random()*.22}s;
    `;
    st.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    document.body.appendChild(st);
    setTimeout(()=>st.remove(),1400);
  }
}

/* ─── HELPERS ─── */
function setMsg(txt,cls) {
  const el=document.getElementById('msg');
  el.textContent=txt;
  el.className='msg '+cls;
}

/* ─── START ─── */
updateChase();
newProblem();
